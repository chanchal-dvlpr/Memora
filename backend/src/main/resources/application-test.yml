# Test runs remain quiet while retaining the shared configuration contract.
spring:
  config:
    activate:
      on-profile: test
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop

logging:
  level:
    root: WARN
