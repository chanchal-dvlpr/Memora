name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    name: Build, Lint & Test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'mcp/package-lock.json'

      - name: Install dependencies
        run: |
          cd mcp
          npm ci

      - name: Typecheck
        run: |
          cd mcp
          npm run typecheck

      - name: Lint
        run: |
          cd mcp
          npm run lint

      - name: Run Test Suite
        run: |
          cd mcp
          npm test

      - name: Build Project
        run: |
          cd mcp
          npm run build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          file: ./mcp/Dockerfile
          push: false
          tags: memora-mcp:test
